previews:
  generation: manual
  plan: free
  expireAfterDays: 1

services:
  - type: web
    name: happyeverything-backend
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    autoDeployTrigger: off
    root: .
    buildCommand: pnpm install --frozen-lockfile && pnpm build:server
    startCommand: pnpm --filter server start
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: NODE_ENV
        sync: false
      - key: CF_ACCOUNT_ID
        sync: false
      - key: CF_IMAGES_API_TOKEN
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLIC_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_PROJECT_ID
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: MAX_PROFILES_PER_USER
        sync: false
      - key: MAX_LISTS_PER_PROFILE
        sync: false
      - key: MAX_ITEMS_PER_LIST
        sync: false
      - key: MAX_TOP_PICKS_PER_LIST
        sync: false

  - type: web
    name: happyeverything-frontend
    runtime: static
    plan: free
    region: frankfurt
    branch: main
    autoDeployTrigger: off
    root: .
    buildCommand: pnpm install --frozen-lockfile && pnpm build:frontend
    staticPublishPath: frontend/dist
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: VITE_NODE_ENV
        sync: false
      - key: VITE_APP_BASE_URL
        sync: false
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_PUBLIC_KEY
        sync: false
      - key: VITE_SENTRY_DSN
        sync: false
      - key: VITE_CF_IMAGES_API_URL
        sync: false
      - key: VITE_CF_IMAGE_ACCOUNT_HASH
        sync: false
